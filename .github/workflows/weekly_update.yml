name: Weekly Movie Update

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date in YYYY-MM-DD format"
        required: false
      dry_run:
        description: "Run update without committing or pushing"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 18 * * 0"
    - cron: "0 18 * * 4"

concurrency:
  group: weekly-movie-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Rebase on latest main
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Python dependencies
        run: python -m pip install requests python-dotenv

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Update movie data
        env:
          KOBIS_KEY: ${{ secrets.KOBIS_KEY }}
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          START_DATE: ${{ github.event.inputs.start_date }}
        run: |
          if [ -n "$START_DATE" ]; then
            python3 update_movies.py --start-date "$START_DATE"
          else
            python3 update_movies.py
          fi

      - name: Validate Flutter project
        run: |
          flutter analyze
          flutter test

      - name: Build web
        run: flutter build web --release --base-href /

      - name: Publish build to docs
        run: |
          rm -rf docs
          cp -R build/web docs
          printf '%s\n' 'k-moviereleasecalendar.kr' > docs/CNAME

      - name: Commit changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data docs
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: weekly movie update"
          git status --short
          git pull --rebase --autostash origin main
          git push origin HEAD:main

      - name: Show pending changes in dry run
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          git status --short
          git diff --stat -- data docs
